name: Native Image Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            suffix: ''
            arch: ''
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            suffix: ''
            arch: ''
          - os: macos-14
            label: macos-aarch64
            suffix: ''
            arch: ''
          - os: macos-latest
            label: macos-x86_64
            suffix: ''
            arch: 'x64'
          - os: windows-latest
            label: windows-x86_64
            suffix: '.exe'
            arch: ''

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          architecture: ${{ matrix.arch || '' }}

      - name: Build native image
        run: |
          mvn package -Dnative -DskipTests

      - name: Rename artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          SRC="target/quarkus-mcp-gateway-1.0.0-runner${{ matrix.suffix }}"
          DEST="quarkus-mcp-gateway-${TAG}-${{ matrix.label }}${{ matrix.suffix }}"
          cp "${SRC}" "${DEST}"
          echo "ARTIFACT=${DEST}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ARTIFACT }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
