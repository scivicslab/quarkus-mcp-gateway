quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false
quarkus.http.port=28001
quarkus.http.cors=true

# alphaXiv authentication
# 1. Create a free account at https://alphaxiv.org
# 2. Log in via browser, open DevTools (F12) > Application > Local Storage > https://alphaxiv.org
#    and copy the access token value.
# 3. Set it here:
mcp.alphaxiv.access-token=
mcp.alphaxiv.refresh-token=
mcp.alphaxiv.client-id=
