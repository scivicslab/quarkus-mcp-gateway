# MCP Gateway - Server Registry
# Servers listed here are auto-registered on startup.
#
# Each entry:
#   name:        unique identifier (used in proxy URL: /mcp/{name})
#   url:         base URL of the MCP server
#   description: optional human-readable description

servers:
  - name: llm-console-claude
    url: http://localhost:8090
    description: LLM Console - Claude

  - name: workflow-editor
    url: http://localhost:8091
    description: Turing Workflow Editor

  - name: wikipedia-search
    url: http://localhost:28080
    description: Wikipedia full-text search via OpenSearch

  - name: chat-ui-28100
    url: http://localhost:28100
    description: Chat UI (port 28100)

  - name: chat-ui-28101
    url: http://localhost:28101
    description: Chat UI (port 28101)

  - name: chat-ui-28102
    url: http://localhost:28102
    description: Chat UI (port 28102)

# stdio-backed MCP servers — launched as subprocesses by StdioLauncher on startup.
# Accessible individually at /mcp/{name}, or aggregated at /mcp/_all.
# Note: the built-in "fetch" tool is always available at /mcp/_all without configuration.
stdio:
  - name: filesystem
    command: npx -y @modelcontextprotocol/server-filesystem /home/devteam
